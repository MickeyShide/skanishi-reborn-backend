services:
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 4000 --reload
    ports:
      - "4000:4000"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://skanishi:skanishi@db:5432/skanishi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-development-secret-key-change-before-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      BOT_TOKEN: local-bot-token
      YANDEX_MAPS_API_KEY: local-yandex-maps-browser-key
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      SQL_ECHO: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/ready', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrate:
    build:
      context: .
    command: alembic upgrade head
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://skanishi:skanishi@db:5432/skanishi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-development-secret-key-change-before-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      BOT_TOKEN: local-bot-token
      YANDEX_MAPS_API_KEY: local-yandex-maps-browser-key
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      SQL_ECHO: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skanishi
      POSTGRES_USER: skanishi
      POSTGRES_PASSWORD: skanishi
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skanishi -d skanishi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_local_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  celery:
    build:
      context: .
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://skanishi:skanishi@db:5432/skanishi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      SECRET_KEY: local-development-secret-key-change-before-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      BOT_TOKEN: local-bot-token
      YANDEX_MAPS_API_KEY: local-yandex-maps-browser-key
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      SQL_ECHO: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-beat:
    build:
      context: .
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://skanishi:skanishi@db:5432/skanishi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      SECRET_KEY: local-development-secret-key-change-before-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      BOT_TOKEN: local-bot-token
      YANDEX_MAPS_API_KEY: local-yandex-maps-browser-key
      FRONTEND_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      SQL_ECHO: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_local_data:
  redis_local_data:
  rabbitmq_local_data:
